<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BuzzIt! - Admin Login</title>
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0" />
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(168, 85, 247, 0.05), transparent 50%),
                radial-gradient(circle at bottom left, rgba(251, 146, 60, 0.05), transparent 50%),
                var(--bg-color);
        }

        .brand-logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
        }

        .brand-icon {
            background: var(--orange-gradient);
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            transform: rotate(-10deg);
            box-shadow: 0 8px 15px rgba(251, 146, 60, 0.3);
        }

        .brand-logo h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2rem;
            font-weight: 500;
        }

        /* Toggle Buttons */
        .role-toggle {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            background: transparent;
        }

        .toggle-btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-family: 'Nunito', sans-serif;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.2s;
        }

        .toggle-btn.active {
            background: var(--primary-gradient);
            color: white;
            border: none;
            box-shadow: 0 8px 15px rgba(168, 85, 247, 0.2);
        }

        .toggle-btn.inactive {
            background: white;
            color: var(--text-main);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: var(--shadow-soft);
        }

        .toggle-btn.inactive:hover {
            background: #f8fafc;
        }

        /* Main Card */
        .login-wrapper {
            width: 100%;
            max-width: 500px;
            position: relative;
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .form-icon {
            width: 48px;
            height: 48px;
            /* Admin color theme is dark slate / gray */
            background: var(--text-main);
            border-radius: 12px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .form-header h2 {
            margin: 0;
            font-weight: 800;
            font-size: 1.5rem;
        }

        .form-header p {
            margin: 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .input-grp {
            margin-bottom: 1.5rem;
        }
    </style>
</head>

<body>

    <div class="brand-logo">
        <div class="brand-icon"><span class="material-symbols-rounded">bolt</span></div>
        <h1 class="text-gradient">BuzzIt!</h1>
    </div>
    <div class="subtitle">The Ultimate Interactive Quiz Experience</div>

    <div class="role-toggle">
        <button class="toggle-btn inactive" id="tabTeam" onclick="window.location.href='index.html'">
            <span class="material-symbols-rounded" style="font-size: 20px;">groups</span> Participant Login
        </button>
        <button class="toggle-btn active" id="tabAdmin">
            <span class="material-symbols-rounded" style="font-size: 20px;">admin_panel_settings</span> Admin Login
        </button>
    </div>

    <div class="login-wrapper">
        <div class="white-card">
            <div class="form-header">
                <div class="form-icon"><span class="material-symbols-rounded">shield_person</span></div>
                <div>
                    <h2>Admin Portal</h2>
                    <p>Login to manage the arena</p>
                </div>
            </div>

            <form id="adminForm">
                <div class="input-grp">
                    <label class="input-label">Admin Username</label>
                    <input type="text" id="username" class="input-field" placeholder="Enter admin username" required />
                </div>
                <div class="input-grp">
                    <label class="input-label">Password</label>
                    <input type="password" id="password" class="input-field" placeholder="Enter password" required />
                </div>

                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;" id="submitBtn">
                    Access Dashboard <span class="material-symbols-rounded"
                        style="font-size: 18px;">arrow_forward</span>
                </button>
            </form>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        const adminForm = document.getElementById('adminForm');
        const submitBtn = document.getElementById('submitBtn');

        adminForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="material-symbols-rounded spin">sync</span> Verifying...';

            try {
                const response = await fetch(`${window.APP_CONFIG.backendUrl}/api/admin/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('adminToken', data.token);
                    window.APP_CONFIG.showToast('Authentication successful', 'success');

                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 500);
                } else {
                    window.APP_CONFIG.showToast(data.message || 'Authentication failed', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = 'Access Dashboard <span class="material-symbols-rounded">arrow_forward</span>';
                }
            } catch (err) {
                window.APP_CONFIG.showToast('Network error connecting to server.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = 'Access Dashboard <span class="material-symbols-rounded">arrow_forward</span>';
            }
        });

        if (localStorage.getItem('adminToken')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>

</html>
